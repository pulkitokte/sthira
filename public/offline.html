<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sthira — You're Offline</title>
    <meta name="theme-color" content="#FBF8F2" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
      }

      body {
        min-height: 100%;
        background-color: #FBF8F2;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Quicksand', ui-sans-serif, system-ui, sans-serif;
        color: #33352F;
        padding: 24px;
        -webkit-font-smoothing: antialiased;
      }

      .frame {
        width: 100%;
        max-width: 400px;
      }

      .card {
        background: #FFFFFF;
        border: 1px solid #ECE6D8;
        border-radius: 2rem;
        padding: 48px 32px;
        text-align: center;
        box-shadow: 0 12px 32px -14px rgba(51, 53, 47, 0.16);
      }

      .icon-wrap {
        width: 80px;
        height: 80px;
        background: rgba(143, 179, 156, 0.2);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
      }

      h1 {
        font-size: 1.375rem;
        font-weight: 700;
        color: #33352F;
        margin-bottom: 12px;
        letter-spacing: -0.01em;
      }

      p {
        font-size: 0.9375rem;
        color: #777A70;
        line-height: 1.65;
        margin-bottom: 32px;
        max-width: 280px;
        margin-left: auto;
        margin-right: auto;
      }

      button {
        display: block;
        width: 100%;
        background: #5C7F6A;
        color: #FBF8F2;
        border: none;
        border-radius: 9999px;
        padding: 15px 32px;
        font-family: inherit;
        font-size: 0.9375rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        cursor: pointer;
        transition: background 0.15s;
        margin-bottom: 32px;
      }

      button:hover {
        background: #46604F;
      }

      .footer {
        font-size: 0.75rem;
        color: #777A70;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="card">
        <div class="icon-wrap" aria-hidden="true">
          <svg
            width="34"
            height="34"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M12 3v1.5M5.5 6.5l1.1 1.1M18.5 6.5l-1.1 1.1M3 13.5h1.5M19.5 13.5H21M8 17.5h8"
              stroke="#5C7F6A"
              stroke-width="1.8"
              stroke-linecap="round"
            />
            <path
              d="M8.5 13.5a3.5 3.5 0 017 0"
              stroke="#5C7F6A"
              stroke-width="1.8"
              stroke-linecap="round"
            />
          </svg>
        </div>

        <h1>You're offline</h1>
        <p>
          Take a breath and return when you're connected. Your progress is safely
          saved on your device.
        </p>

        <button onclick="window.location.reload()" type="button">
          Try Again
        </button>

        <p class="footer">Sthira · Steady. Comfortable. Sustainable.</p>
      </div>
    </div>
  </body>
</html>
